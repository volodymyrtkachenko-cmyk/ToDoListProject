{% extends 'base.html' %}
{% load static %}


{% block extra_css %}
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500&display=swap"
      rel="stylesheet"/>
<link href="{% static 'boards/css/main.css' %}" rel="stylesheet">

<style>
    /* ── Початковий стан сторінки ── */
    body {
        opacity: 0;
        transform: translateY(10px);
        animation: pageIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }

    @keyframes pageIn {
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* ── Анімація виходу при кліку на посилання ── */
    body.page-leave {
        animation: pageOut 0.3s cubic-bezier(0.4, 0, 1, 1) forwards;
    }

    @keyframes pageOut {
        to {
            opacity: 0;
            transform: translateY(-8px);
        }
    }
</style>

{% endblock %}
{% block layout %}
{% include 'components/boards/navbar.html' %}
{% include 'components/boards/sidebar.html' %}


{% block content %}
{% endblock %}

{% endblock %}
{% block extra_js %}
<script src="{% static 'boards/js/main.js' %}"></script>
{% endblock %}
