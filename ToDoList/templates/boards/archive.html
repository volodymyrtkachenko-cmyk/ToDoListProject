{% extends 'layout/board_layout.html' %}
{% load static %}

{% block page_css %}
<link href="{% static 'boards/css/pages/board.css' %}" rel="stylesheet">
<style>
    .day-add-btn {
        display: none !important;
    }

    .day-empty {
        display: none !important;
    }

    .day-tasks {
        pointer-events: none;
    }

    .task-card {
        pointer-events: auto;
    }

    .board-header {
        border-bottom: 2px solid var(--danger);
    }
</style>
{% endblock %}

{% block content %}
<div class="board-wrap">
    <div class="board-header">
        <div class="week-nav">
            <button class="week-btn" id="weekPrev" aria-label="Попередній тиждень">
                <svg viewBox="0 0 16 16" fill="none">
                    <path d="M10 12L6 8l4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </button>
            <span class="week-label" id="weekLabel"></span>
            <button class="week-btn" id="weekNext" aria-label="Наступний тиждень">
                <svg viewBox="0 0 16 16" fill="none">
                    <path d="M6 12l4-4-4-4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"
                          stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <button class="week-today-btn" id="weekToday">Поточний тиждень</button>
    </div>
    <div class="board-grid" id="boardGrid"></div>
</div>

{% include 'components/boards/archive_task_modal.html' %}
{% endblock %}


{% block page_js %}
{{ tasks_json|json_script:"tasks-data" }}
<script src="{% static 'boards/js/pages/archive.js' %}"></script>
{% endblock %}
