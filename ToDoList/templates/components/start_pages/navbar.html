<style>
    /* ─── Navbar ─── */
    .navbar {
        background-color: rgba(11, 13, 20, 0.85);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border-bottom: 1px solid var(--brand-border);
        padding-top: 1rem;
        padding-bottom: 1rem;
    }

    .navbar-brand {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: var(--brand-text) !important;
    }

    .navbar-brand span {
        display: inline-block;
        background: var(--brand-accent);
        color: #fff;
        padding: 0.05em 0.35em;
        border-radius: 6px;
        margin-left: 1px;
    }

    .btn-login {
        color: var(--brand-muted);
        font-weight: 500;
        background-color: transparent; /* Явно вказуємо прозорий фон */
        border: none;
        /* Змінив transition з 'color 0.2s' на 'all 0.2s' для плавного кліку */
        transition: all 0.2s ease;
    }

    .btn-login:hover {
        color: var(--brand-text);
        background-color: transparent;
    }

    .btn-signup {
        background: var(--brand-accent);
        color: #fff;
        border-radius: var(--radius-pill);
        font-weight: 600;
        font-family: 'Syne', sans-serif;
        letter-spacing: -0.01em;
        padding: 0.45rem 1.25rem;
        border: none;
        transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3);
    }

    .btn-signup:hover {
        background: #7c3aed;
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4);
    }

    .btn.danger {
        background: transparent;
        color: #f87171;
        border: 1px solid rgba(248, 113, 113, 0.25);
        border-radius: var(--radius-pill);
        font-weight: 600;
        font-family: 'Syne', sans-serif;
        letter-spacing: -0.01em;
        padding: 0.45rem 1.25rem;
        transition: background 0.2s, color 0.2s, border-color 0.2s,
        transform 0.15s, box-shadow 0.2s;
    }

    .btn.danger:hover {
        background: rgba(248, 113, 113, 0.1);
        color: #fca5a5;
        border-color: rgba(248, 113, 113, 0.5);
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(248, 113, 113, 0.2);
    }

    .btn.danger:active {
        transform: translateY(0);
        box-shadow: none;
        background: rgba(248, 113, 113, 0.15);
    }

    /* ─── Активне посилання ─── */
    .navbar .nav-link.nav-link-item {
        color: var(--brand-muted) !important;
        font-size: 0.9rem;
        text-decoration: none;
        padding: 0.5rem 0.85rem;
        position: relative;
        transition: color 0.2s;
    }

    .navbar .nav-link.nav-link-item:hover {
        color: var(--brand-text) !important;
    }

    /* підкреслення для активної сторінки */
    .navbar .nav-link.nav-link-item.active {
        color: var(--brand-text) !important;
    }

    .navbar .nav-link.nav-link-item.active::after {
        content: '';
        position: absolute;
        bottom: -4px;
        left: 0;
        right: 0;
        height: 2px;
        border-radius: 2px;
        background: var(--brand-accent);
    }
</style>


<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">Flō<span>w</span></a>
        <button class="navbar-toggler border-0" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Відкрити меню">
            <i class="bi bi-list text-white fs-2"></i>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-3 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link nav-link-item {% if request.resolver_match.url_name == 'home' %}active{% endif %}"
                       href="{% url 'home' %} ">Головна</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-item {% if request.resolver_match.url_name == 'about' %}active{% endif %}"
                       href="{% url 'about' %}">Про нас</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link nav-link-item {% if request.resolver_match.url_name == 'contacts' %}active{% endif %}"
                       href="{% url 'contacts' %}">Контакти</a>
                </li>
            </ul>

            <div class="d-flex align-items-center gap-2 ms-auto">
                <a href="{% url 'login' %}" class="btn btn-login text-decoration-none">Увійти</a>
                <a href="{% url 'register' %}" class="btn btn-signup">Реєстрація</a>
            </div>
        </div>
    </div>
</nav>
