<!-- ══════════ SIDEBAR ══════════ -->
<!-- Підключи стилі нижче в свій <style> або окремий .css файл -->

<aside class="sidebar">

    <!-- Логотип -->
    <div class="sidebar-logo">
        <a class="navbar-brand" href="{% url 'main' %}">Flō<span>w</span></a>
    </div>

    <!-- Навігація -->
    <div class="sidebar-section">
        <div class="sidebar-label">Навігація</div>
        <a href="{% url 'main' %}" class="nav-link-custom">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <rect x="3" y="4" width="18" height="18" rx="2"/>
                <path d="M16 2v4M8 2v4M3 10h18"/>
            </svg>
            Головна
        </a>
        <a href="{% url 'archive' %}" class="nav-link-custom">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <polyline points="21 8 21 21 3 21 3 8"/>
                <rect x="1" y="3" width="22" height="5" rx="1"/>
                <line x1="10" y1="12" x2="14" y2="12"/>
            </svg>
            Архів
        </a>
    </div>

    <!-- Меню -->
    <div class="sidebar-section">
        <div class="sidebar-label">Меню</div>
        <a href="{% url 'profile' %}"
           class="nav-link-custom{% if request.resolver_match.url_name == 'profile' %} active{% endif %}">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
            Профіль
        </a>
        <a href="{% url 'contacts_boards' %}"
           class="nav-link-custom{% if request.resolver_match.url_name == 'contacts_boards' %} active{% endif %}">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Контакти
        </a>
        <a href="{% url 'about_boards' %}"
           class="nav-link-custom{% if request.resolver_match.url_name == 'about_boards' %} active{% endif %}">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <circle cx="12" cy="12" r="10"/>
                <line x1="12" y1="8" x2="12" y2="12"/>
                <line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            Про нас
        </a>
    </div>

    <!-- Низ: юзер + вийти -->
    <div class="sidebar-bottom">
        <div class="user-row">

            {% if user.profile.avatar %}
            <img src="{{ user.profile.avatar.url }}" class="user-avatar-sm" style="object-fit: cover;" alt="Avatar">
            {% else %}
            <div class="user-avatar-sm">{{ user.username|first|upper }}</div>
            {% endif %}

            <div class="user-info-sm">
                <div class="user-name-sm">{{ user.username }}</div>
                <div class="user-role-sm">Особистий акаунт</div>
            </div>
        </div>

        <a href="{% url 'logout' %}" class="nav-link-custom btn-logout danger mt-1" style="text-decoration:none;">
            <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                <polyline points="16 17 21 12 16 7"/>
                <line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
            Вийти
        </a>
    </div>

</aside>


<!-- ══════════ CSS ══════════ -->
<style>
    .sidebar {
        width: 200px;
        min-width: 200px;
        background: #1a1a1a;
        border-right: 1px solid #2e2e2e;
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        z-index: 100;
    }

    /* Логотип */
    .sidebar-logo {
        padding: 16px 20px 14px;
        border-bottom: 1px solid #2e2e2e;
        display: flex;
        align-items: center;
    }

    .navbar-brand {
        font-size: 1.35rem;
        font-weight: 800;
        letter-spacing: -0.04em;
        color: #f0f0f0 !important;
        text-decoration: none;
    }

    .navbar-brand span {
        display: inline-block;
        background: #8b5cf6;
        color: #fff;
        padding: 0.05em 0.35em;
        border-radius: 6px;
        margin-left: 1px;
    }

    /* Секція з лейблом */
    .sidebar-section {
        padding: 20px 12px 6px;
    }

    .sidebar-label {
        font-size: 10px;
        font-weight: 600;
        letter-spacing: .12em;
        text-transform: uppercase;
        color: #555;
        padding: 0 8px;
        margin-bottom: 6px;
    }

    /* Посилання */
    .nav-link-custom {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 7px;
        font-size: .825rem;
        font-weight: 500;
        color: #888;
        text-decoration: none;
        transition: background .15s, color .15s;
        cursor: pointer;
        border: none;
        background: none;
        width: 100%;
        text-align: left;
        font-family: inherit;
    }

    .nav-link-custom:hover {
        background: #2a2a2a;
        color: #f0f0f0;
    }

    .nav-link-custom.active {
        background: rgba(91, 94, 244, .15);
        color: #5b5ef4;
    }

    /* Вийти */
    .btn-logout {
        color: #e05252 !important;
    }

    .btn-logout:hover {
        background: rgba(224, 82, 82, .12) !important;
        color: #e05252 !important;
    }

    /* Низ */
    .sidebar-bottom {
        margin-top: auto;
        padding: 12px;
        border-top: 1px solid #2e2e2e;
    }

    .user-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 7px;
    }

    .user-avatar-sm {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background: #5b5ef4;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: .7rem;
        font-weight: 700;
        color: #fff;
        flex-shrink: 0;
    }

    .user-info-sm {
        overflow: hidden;
    }

    .user-name-sm {
        font-size: .78rem;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #f0f0f0;
    }

    .user-role-sm {
        font-size: .68rem;
        color: #555;
    }
</style>
